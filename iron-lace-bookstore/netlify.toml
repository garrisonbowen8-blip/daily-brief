# Netlify configuration for the Iron Lace Bookstore site.
# This file is read when the site's "Base directory" is set to
# iron-lace-bookstore (as documented in README.md).
#
# It only declares where the owner-dashboard serverless functions live.
# Your existing publish/build settings in the Netlify UI are left untouched.

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
