# Netlify config used when the site's base directory is "iron-lace-bookstore".
# Publishes this folder and bundles the owner-dashboard serverless functions so
# the dashboard's APIs (/.netlify/functions/*) deploy correctly.
[build]
  publish = "."

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
